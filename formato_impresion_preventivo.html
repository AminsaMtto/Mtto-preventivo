<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title></title>

<style>

    @page{
        size: letter;
        margin: 0;
    }

    body{
        font-family: Arial, sans-serif;
        margin:0;
        padding:20px;
        background:white;
    }

    .formato{
        width:90%;
        margin:auto;
        border:2px solid black;
        padding:15px;
        box-sizing:border-box;
    }

    .titulo{
        border:2px solid black;
        text-align:center;
        font-weight:bold;
        font-size:24px;
        padding:12px;
        margin-bottom:20px;
    }

    table{
        width:100%;
        border-collapse:collapse;
    }

    td{
        border:1px solid black;
        padding:6px;
        font-size:14px;
    }

    .sin-borde{
        border:none;
    }

    .campo-rojo{
        color:red;
    }

    .espacio{
        height:350px;
        vertical-align:top;
    }

    .firmas{
        margin-top:30px;
        display:flex;
        justify-content:space-around;
    }

    .firma-box{
        text-align:center;
        font-size:14px;
    }

    .firma-linea{
        width:220px;
        height:45px;
        border:1px solid black;
        margin-bottom:8px;
    }

    @media print{

        html, body{
            margin:0;
            padding:0;
        }

        body{
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }

    }

</style>
</head>

<body>

<div class="formato">

    <div class="titulo">
        MANTENIMIENTO PREVENTIVO
    </div>

                </span>
            </td>
        </tr>
    </table>

    <br>

    <table>
            <tr>
                <td width="65%">
                    TECNICO:
                </td>

                <td width="35%">
                    FECHA:
                </td>
            </tr>

            <tr>
                <td>
                    MAQUINA / EQUIPO:
                </td>

                <td>
                    <span class="campo-rojo">
                        TIEMPO REQUERIDO:
                    </span>
                </td>
            </tr>

            <tr>
                <td>
                    ÁREA:
                </td>

                <td class="sin-borde"></td>
            </tr>
        </table>

        <br>

        <table>
            <tr>
                <td width="50%" style="text-align:center;font-weight:bold;">
                    CONDICION INICIAL DEL EQUIPO
                </td>

                <td width="50%" style="text-align:center;font-weight:bold;">
                    CONDICION FINAL DEL EQUIPO Y OBSERVACIONES
                </td>
            </tr>

            <tr>
                <td class="espacio" id="condicion-inicial"></td>

                <td class="espacio" id="condicion-final"></td>
            </tr>
        </table>

        <div class="firmas">

            <div class="firma-box">
                <div class="firma-linea"></div>
                Firma de Técnico
            </div>

            <div class="firma-box">
                <div class="firma-linea"></div>
                Firma Jefe de Área
            </div>

        </div>

    </div>

</div>

<script>
    // Función para leer parámetros de la URL
    function getParameterByName(name) {
        const url = new URL(window.location.href);
        return url.searchParams.get(name);
    }

    // Función para autocompletar campos
    function autocompletarFormato() {
        const equipo = getParameterByName('equipo');
        const centro = getParameterByName('centro');
        const frecuencia = getParameterByName('frecuencia');
        const tecnico = getParameterByName('tecnico');
        const condicionInicial = getParameterByName('condicionInicial');
        const condicionFinal = getParameterByName('condicionFinal');

        // Autocompletar campos
        const formato = document.querySelector('.formato');
        
        if (!formato) return;

        // TÉCNICO
        if (tecnico) {
            const tecnicoCell = formato.querySelector('tr:first-child td:first-child');
            if (tecnicoCell && tecnicoCell.textContent.includes('TECNICO:')) {
                tecnicoCell.innerHTML = `TECNICO: <strong>${tecnico}</strong>`;
            }
        }

        // MAQUINA / EQUIPO
        if (equipo) {
            const equipoCell = formato.querySelector('tr:nth-child(2) td:first-child');
            if (equipoCell && equipoCell.textContent.includes('MAQUINA / EQUIPO:')) {
                equipoCell.innerHTML = `MAQUINA / EQUIPO: <strong>${equipo}</strong>`;
            }
        }

        // ÁREA (usar centro como área)
        if (centro) {
            const areaCell = formato.querySelector('tr:nth-child(3) td:first-child');
            if (areaCell && areaCell.textContent.includes('ÁREA:')) {
                areaCell.innerHTML = `ÁREA: <strong>${centro}</strong>`;
            }
        }

        // FECHA - No autocompletar, dejar vacío para que el usuario la llene

        // TIEMPO REQUERIDO (usar frecuencia)
        if (frecuencia) {
            const tiempoCell = formato.querySelector('tr:nth-child(2) td:last-child .campo-rojo');
            if (tiempoCell) {
                tiempoCell.innerHTML = `TIEMPO REQUERIDO: <strong>${frecuencia}</strong>`;
            }
        }

        // CONDICIÓN INICIAL
        if (condicionInicial) {
            const condicionInicialCell = formato.querySelector('#condicion-inicial');
            if (condicionInicialCell) {
                condicionInicialCell.innerHTML = `<strong>CONDICIÓN INICIAL:</strong><br>${condicionInicial}`;
            }
        }
        
        // CONDICIÓN FINAL
        if (condicionFinal) {
            const condicionFinalCell = formato.querySelector('#condicion-final');
            if (condicionFinalCell) {
                condicionFinalCell.innerHTML = `<strong>CONDICIÓN FINAL:</strong><br>${condicionFinal}`;
            }
        }
    }

    // Ejecutar autocompletado cuando se carga la página
    document.addEventListener('DOMContentLoaded', function() {
        autocompletarFormato();
    });
</script>

</body>
</html>
