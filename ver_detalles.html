<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mantenimiento Preventivo</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }
    body {
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 0;
    }
    .page {
      width: 905px;
      min-height: 564px;

      position: relative;
      padding-bottom: 25px;
    }
    .content {
      width: 720px;
      margin: 22px auto 0;
    }
    .title-box {
      border: 2px solid #222;
      height: 46px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 28px;
      letter-spacing: 0.5px;
      margin-bottom: 22px;
    }
    table {
      border-collapse: collapse;
      width: 100%;
    }
    .info-table td {
      border: 2px solid #222;
      height: 23px;
      font-size: 14px;
      padding: 2px 6px;
      vertical-align: middle;
    }
    .red {
      color: #d32020;
    }
    .condition-table {
      margin-top: 20px;
    }
    .condition-table th {
      border: 2px solid #222;
      height: 24px;
      font-size: 14px;
      font-weight: normal;
      text-align: center;
      vertical-align: middle;
    }
    .condition-table td {
      border: 2px solid #222;
      height: 275px;
      vertical-align: top;
      padding: 6px;
      font-size: 13px;
    }
    .signatures {
      width: 100%;
      margin-top: 20px;
      display: flex;
      justify-content: center;
      gap: 45px;
      padding-bottom: 10px;
    }
    .signature {
      text-align: center;
    }
    .signature-box {
      width: 190px;
      height: 46px;
      border: 1.8px solid #222;
      margin-bottom: 4px;
      background: transparent;
    }
    .signature-label {
      font-size: 14px;
      line-height: 18px;
      padding-bottom: 5px;
    }

    @media print {
      html, body {
        margin: 0;
        padding: 0;
        background: white;
      }
      .page {
        border: none;
        width: 100%;
      }
      body {
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
      @page {
        margin: 0;
        size: letter;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="content">

      <div class="title-box">
        MANTENIMIENTO PREVENTIVO
      </div>

      <table class="info-table">
        <tr>
          <td id="cell-tecnico" style="width:65%;">TECNICO:</td>
          <td id="cell-fecha" style="width:35%;">FECHA:</td>
        </tr>
        <tr>
          <td id="cell-equipo">MAQUINA / EQUIPO:</td>
          <td id="cell-tiempo" class="red">TIEMPO REQUERIDO:</td>
        </tr>
        <tr>
          <td id="cell-area">ÁREA:</td>
          <td style="border:none;"></td>
        </tr>
      </table>

      <table class="condition-table">
        <tr>
          <th style="width:39%;">CONDICION INICIAL DEL EQUIPO</th>
          <th style="width:61%;">CONDICION FINAL DEL EQUIPO Y OBSERVACIONES</th>
        </tr>
        <tr>
          <td id="condicion-inicial"></td>
          <td id="condicion-final"></td>
        </tr>
      </table>

      <div class="signatures">
        <div class="signature">
          <div class="signature-box"></div>
          <div class="signature-label">Firma de Técnico</div>
        </div>
        <div class="signature">
          <div class="signature-box"></div>
          <div class="signature-label">Firma Jefe de Área</div>
        </div>
      </div>

    </div>
  </div>

  <script>
    function getParam(name) {
      return new URL(window.location.href).searchParams.get(name);
    }

    function formatearFecha(fecha) {
      if (!fecha) return '-';
      try {
        // Si es formato ISO con T, extraer solo la fecha
        if (fecha.includes('T')) {
          fecha = fecha.split('T')[0];
        }
        const [y, m, d] = fecha.split('-');
        return `${d}/${m}/${y}`;
      } catch (e) {
        console.error('Error formateando fecha:', e, fecha);
        return fecha;
      }
    }

    function autocompletar() {
      const tecnico        = getParam('tecnico');
      const equipo         = getParam('equipo');
      const centro         = getParam('centro');
      const tiempoRequerido = getParam('tiempoRequerido');
      const fecha          = getParam('fecha');
      const condicionInicial = getParam('condicionInicial');
      const condicionFinal   = getParam('condicionFinal');

      if (tecnico) {
        document.getElementById('cell-tecnico').innerHTML =
          `TECNICO: <strong>${tecnico}</strong>`;
      }

      if (equipo) {
        document.getElementById('cell-equipo').innerHTML =
          `MAQUINA / EQUIPO: <strong>${equipo}</strong>`;
      }

      if (centro) {
        document.getElementById('cell-area').innerHTML =
          `ÁREA: <strong>${centro}</strong>`;
      }

      if (tiempoRequerido) {
        document.getElementById('cell-tiempo').innerHTML =
          `<span class="red">TIEMPO REQUERIDO: <strong>${tiempoRequerido}</strong></span>`;
      }

      if (fecha) {
        document.getElementById('cell-fecha').innerHTML =
          `FECHA: <strong>${formatearFecha(fecha)}</strong>`;
      }

      if (condicionInicial) {
        document.getElementById('condicion-inicial').innerHTML =
          `<strong>CONDICIÓN INICIAL DEL EQUIPO:</strong><br>${condicionInicial}`;
      }

      if (condicionFinal) {
        document.getElementById('condicion-final').innerHTML =
          `<strong>CONDICIÓN FINAL DEL EQUIPO:</strong><br>${condicionFinal}`;
      }
    }

    document.addEventListener('DOMContentLoaded', autocompletar);
  </script>
</body>
</html>
