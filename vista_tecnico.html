<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vista Técnico - AMINSA</title>
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
  <link rel="icon" type="image/png" href="LOGO.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Cormorant+SC:wght@300;400;500;600;700&family=IM+Fell+DW+Pica&family=Inconsolata:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --negro:       #0e0e0e;
      --carbono:     #111111;
      --gris-osc:    #1a1a1a;
      --gris:        #2e2e2e;
      --gris-med:    #4a4a4a;
      --gris-clar:   #7a7a7a;
      --borde:       #d8d4ce;
      --borde-suave: #e8e4de;
      --fondo:       #faf9f7;
      --fondo-alt:   #f4f2ee;
      --blanco:      #ffffff;
      --acento:      #1a1a1a;
      --rojo:        #8b1a1a;
      --verde:       #1a4a2a;
      --verde-clar:  #1e6b35;
      --texto:       #1a1a1a;
      --texto-sec:   #4a4a4a;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Cormorant Garamond', serif;
      background: var(--fondo);
      color: var(--texto);
      min-height: 100vh;
    }

    .header {
      background: var(--negro);
      color: var(--blanco);
      padding: 1rem 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 3px solid var(--acento);
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .header h1 {
      font-family: 'Cormorant SC', serif;
      font-size: 1.4rem;
      letter-spacing: 0.15em;
    }

    .header .subtitle {
      font-size: 0.8rem;
      color: var(--gris-clar);
      font-family: 'Inconsolata', monospace;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 1rem;
    }

    .tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
      border-bottom: 2px solid var(--borde);
      overflow-x: auto;
    }

    .tab {
      padding: 0.75rem 1.5rem;
      background: transparent;
      border: none;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1rem;
      cursor: pointer;
      color: var(--texto-sec);
      border-bottom: 3px solid transparent;
      transition: all 0.3s;
      white-space: nowrap;
    }

    .tab:hover {
      color: var(--texto);
      background: var(--fondo-alt);
    }

    .tab.active {
      color: var(--texto);
      border-bottom-color: var(--acento);
      font-weight: 600;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    .card {
      background: var(--blanco);
      border: 1px solid var(--borde);
      border-radius: 8px;
      padding: 1rem;
      margin-bottom: 1rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid var(--borde-suave);
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .card-header h2 {
      font-family: 'Cormorant SC', serif;
      font-size: 1.1rem;
      letter-spacing: 0.1em;
    }

    #calendar {
      max-width: 100%;
      margin: 0 auto;
    }

    .table-wrap {
      overflow-x: auto;
      border: 1px solid var(--borde);
      border-radius: 8px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.95rem;
    }

    thead {
      background: var(--gris-osc);
      color: var(--blanco);
    }

    th {
      padding: 0.75rem 0.5rem;
      text-align: left;
      font-family: 'Cormorant SC', serif;
      font-weight: 500;
      letter-spacing: 0.05em;
      font-size: 0.85rem;
    }

    td {
      padding: 0.75rem 0.5rem;
      border-bottom: 1px solid var(--borde-suave);
      font-size: 0.85rem;
    }

    tr:hover {
      background: var(--fondo-alt);
    }

    .badge {
      display: inline-block;
      padding: 0.25rem 0.75rem;
      border-radius: 4px;
      font-size: 0.85rem;
      font-weight: 500;
    }

    .badge.estado-realizado {
      background: var(--verde-clar);
      color: var(--blanco);
    }

    .badge.estado-pendiente {
      background: var(--gris-med);
      color: var(--blanco);
    }

    .badge.estado-vencido {
      background: var(--rojo);
      color: var(--blanco);
    }

    .checklist-items {
      background: var(--fondo-alt);
      padding: 1rem;
      border-radius: 6px;
      white-space: pre-wrap;
      font-family: 'Inconsolata', monospace;
      font-size: 0.9rem;
      max-height: 200px;
      overflow-y: auto;
    }

    .loading {
      text-align: center;
      padding: 3rem;
      color: var(--texto-sec);
    }

    .loading::after {
      content: '...';
      animation: dots 1.5s steps(4, end) infinite;
    }

    @keyframes dots {
      0%, 20% { content: '.'; }
      40% { content: '..'; }
      60%, 100% { content: '...'; }
    }

    .empty-state {
      text-align: center;
      padding: 3rem;
      color: var(--texto-sec);
    }

    .empty-state svg {
      width: 48px;
      height: 48px;
      margin-bottom: 1rem;
      opacity: 0.5;
    }

    .footer {
      text-align: center;
      padding: 1.5rem;
      color: var(--texto-sec);
      font-size: 0.8rem;
      border-top: 1px solid var(--borde);
      margin-top: 1.5rem;
    }

    /* Responsive para móviles */
    @media (max-width: 768px) {
      .header {
        padding: 0.75rem 1rem;
      }

      .header h1 {
        font-size: 1.1rem;
      }

      .header .subtitle {
        font-size: 0.7rem;
      }

      .container {
        padding: 0.75rem;
      }

      .tabs {
        margin-bottom: 1rem;
      }

      .tab {
        padding: 0.5rem 1rem;
        font-size: 0.9rem;
      }

      .card {
        padding: 0.75rem;
      }

      .card-header h2 {
        font-size: 1rem;
      }

      .card-header button {
        font-size: 0.8rem;
        padding: 0.4rem 0.8rem;
      }

      #instrucciones-suscripcion {
        font-size: 0.8rem;
        padding: 0.75rem;
      }

      table {
        font-size: 0.75rem;
      }

      th, td {
        padding: 0.5rem 0.25rem;
      }

      .badge {
        font-size: 0.75rem;
        padding: 0.2rem 0.5rem;
      }
    }
  </style>
</head>
<body>
  <div class="header">
    <div>
      <h1>VISTA TÉCNICO</h1>
      <div class="subtitle">AMINSA · Mantenimientos Preventivos</div>
    </div>
    <div class="subtitle">Solo lectura</div>
  </div>

  <div class="container">
    <div class="tabs">
      <button class="tab active" onclick="showTab('calendario')">Calendario</button>
      <button class="tab" onclick="showTab('checklists')">Checklists</button>
    </div>

    <div id="tab-calendario" class="tab-content active">
      <div class="card">
        <div class="card-header">
          <h2>Calendario de Mantenimientos</h2>
          <div style="display: flex; gap: 0.5rem;">
            <button class="tab" onclick="suscribirGoogleCalendar()" style="padding: 0.5rem 1rem; font-size: 0.9rem; background: #4285f4; color: white; border: none; border-radius: 4px; cursor: pointer;">
              📅 Google Calendar
            </button>
            <button class="tab" onclick="suscribirOutlook()" style="padding: 0.5rem 1rem; font-size: 0.9rem; background: #0078d4; color: white; border: none; border-radius: 4px; cursor: pointer;">
              📅 Outlook
            </button>
          </div>
        </div>
        <div id="calendar"></div>
      </div>
    </div>

    <div id="tab-checklists" class="tab-content">
      <div class="card">
        <div class="card-header">
          <h2>Checklists Disponibles</h2>
        </div>
        <div style="display: flex; gap: 1rem; margin-bottom: 1rem; flex-wrap: wrap;">
          <div style="flex: 1; min-width: 200px;">
            <input type="text" id="filtro-equipo" placeholder="Buscar por equipo..." oninput="filtrarChecklists()" style="width: 100%; padding: 0.5rem; border: 1px solid var(--borde); border-radius: 4px;">
          </div>
          <div style="flex: 1; min-width: 200px;">
            <select id="filtro-area" onchange="filtrarChecklists()" style="width: 100%; padding: 0.5rem; border: 1px solid var(--borde); border-radius: 4px;">
              <option value="">Todas las áreas</option>
              <option value="Zinc">Zinc</option>
              <option value="Cromo">Cromo</option>
              <option value="Doblado">Doblado</option>
              <option value="Gral">General</option>
            </select>
          </div>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>ID Equipo</th>
                <th>Equipo</th>
                <th>Items</th>
                <th>Estado</th>
              </tr>
            </thead>
            <tbody id="tabla-checklists">
              <tr>
                <td colspan="4">
                  <div class="loading">Cargando checklists</div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <div class="footer">
    © 2026 AMINSA · Vista Técnico · v1.0
  </div>

  <script>
    // ===== CONFIGURACIÓN =====
    const CONFIG = {
      GOOGLE_APPS_SCRIPT_URL: 'https://script.google.com/macros/s/AKfycbzkN2I5IY2n0YCileBAKsRRpBimddc418Qfyu5lbc5n2VYEPKWjG-6h0LE5SEX4WKwA/exec',
      RECARGA_AUTOMATICA_MINUTOS: 5
    };

    let calendar = null;
    let planes = [];
    let ejecuciones = [];
    let checklists = [];

    // ===== INICIALIZACIÓN =====
    document.addEventListener('DOMContentLoaded', function() {
      inicializarCalendario();
      cargarDatos();
      configurarRecargaAutomatica();
    });

    // ===== FUNCIONES DE NAVEGACIÓN =====
    function showTab(tabName) {
      document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
      
      document.querySelector(`.tab[onclick="showTab('${tabName}')"]`).classList.add('active');
      document.getElementById(`tab-${tabName}`).classList.add('active');
    }

    // ===== CALENDARIO =====
    function inicializarCalendario() {
      const calendarEl = document.getElementById('calendar');
      
      calendar = new FullCalendar.Calendar(calendarEl, {
        initialView: 'dayGridMonth',
        locale: 'es',
        headerToolbar: {
          left: 'prev,next today',
          center: 'title',
          right: 'dayGridMonth,listWeek'
        },
        buttonText: {
          today: 'Hoy',
          month: 'Mes',
          week: 'Semana',
          list: 'Lista'
        },
        events: [],
        eventClick: function(info) {
          mostrarDetallesEvento(info.event);
        }
      });

      calendar.render();
    }

    function mostrarDetallesEvento(event) {
      const title = event.title;
      const date = event.start.toLocaleDateString('es-ES');
      alert(`${title}\nFecha: ${date}`);
    }

    // ===== CARGA DE DATOS =====
    async function cargarDatos() {
      try {
        await Promise.all([
          cargarPlanes(),
          cargarEjecuciones(),
          cargarChecklists()
        ]);
        
        actualizarCalendario();
        renderizarChecklists();
      } catch (error) {
        console.error('Error al cargar datos:', error);
        mostrarError('Error al cargar los datos');
      }
    }

    async function cargarPlanes() {
      const result = await fetchGoogleSheets('getAll');
      if (result.success && result.data) {
        planes = result.data.map(row => ({
          id: row.ID,
          equipo: row.Equipo,
          centro: row.Centro,
          frecuencia: row.Frecuencia
        }));
        console.log('Planes cargados:', plans.length);
      } else {
        console.error('Error al cargar planes:', result.error);
      }
    }

    async function cargarEjecuciones() {
      const result = await fetchGoogleSheets('getAllEjecuciones');
      if (result.success && result.data) {
        ejecuciones = result.data;
        console.log('Ejecuciones cargadas:', ejecuciones.length);
      } else {
        console.error('Error al cargar ejecuciones:', result.error);
      }
    }

    async function cargarChecklists() {
      const result = await fetchGoogleSheets('getAllChecklists');
      if (result.success && result.data) {
        checklists = result.data.map(chk => ({
          id: chk.ID,
          idEquipo: chk['ID Equipo'],
          equipo: chk.Equipo,
          items: chk.Items || '',
          activo: chk.Activo === 'true' || chk.Activo === true
        }));
        console.log('Checklists cargados:', checklists.length);
      } else {
        console.error('Error al cargar checklists:', result.error);
      }
    }

    async function fetchGoogleSheets(action) {
      const url = CONFIG.GOOGLE_APPS_SCRIPT_URL;
      const params = new URLSearchParams({ action });
      
      try {
        const response = await fetch(`${url}?${params.toString()}`);
        const text = await response.text();
        
        console.log('Respuesta del backend para', action, ':', text.substring(0, 200));
        
        const pareceJSON = text.trim().startsWith('{') || text.trim().startsWith('[');
        if (!pareceJSON) {
          throw new Error('Respuesta no es JSON: ' + text.substring(0, 100));
        }
        
        return JSON.parse(text);
      } catch (error) {
        console.error('Error en fetch:', error);
        throw error;
      }
    }

    // ===== ACTUALIZAR CALENDARIO =====
    function actualizarCalendario() {
      if (!calendar) return;

      const eventos = planes.map(plan => {
        const ejecucionesPlan = ejecuciones.filter(e => String(e['Plan ID']) === String(plan.id));
        
        let ultimoMantenimiento = null;
        if (ejecucionesPlan.length > 0) {
          ejecucionesPlan.sort((a, b) => new Date(b['Fecha Ejecucion']) - new Date(a['Fecha Ejecucion']));
          ultimoMantenimiento = ejecucionesPlan[0]['Fecha Ejecucion'];
        }

        let proximoMantenimiento = null;
        if (ultimoMantenimiento) {
          proximoMantenimiento = calcularProximoMantenimiento(ultimoMantenimiento, plan.frecuencia);
        }

        if (!proximoMantenimiento) return null;

        const estado = determinarEstado(proximoMantenimiento);
        const color = estado === 'vencido' ? '#8b1a1a' : (estado === 'proximo' ? '#b55a00' : '#1e6b35');

        return {
          title: `${plan.equipo} (${plan.centro})`,
          start: proximoMantenimiento,
          backgroundColor: color,
          borderColor: color
        };
      }).filter(e => e !== null);

      console.log('Eventos generados:', eventos.length);
      calendar.removeAllEvents();
      calendar.addEventSource(eventos);
    }

    function calcularProximoMantenimiento(ultimo, frecuencia) {
      const fecha = new Date(ultimo);
      
      switch (frecuencia) {
        case 'Semanal':
          fecha.setDate(fecha.getDate() + 7);
          break;
        case 'Quincenal':
          fecha.setDate(fecha.getDate() + 15);
          break;
        case 'Mensual':
          fecha.setMonth(fecha.getMonth() + 1);
          break;
        case 'Bimestral':
          fecha.setMonth(fecha.getMonth() + 2);
          break;
        case 'Trimestral':
          fecha.setMonth(fecha.getMonth() + 3);
          break;
        case 'Semestral':
          fecha.setMonth(fecha.getMonth() + 6);
          break;
        case 'Anual':
          fecha.setFullYear(fecha.getFullYear() + 1);
          break;
        default:
          fecha.setDate(fecha.getDate() + 30);
      }
      
      return fecha.toISOString().split('T')[0];
    }

    function determinarEstado(proximo) {
      const hoy = new Date();
      const proximoDate = new Date(proximo);
      const diasDiff = Math.floor((proximoDate - hoy) / (1000 * 60 * 60 * 24));
      
      if (diasDiff < 0) return 'vencido';
      if (diasDiff <= 7) return 'proxima';
      return 'pendiente';
    }

    // ===== RENDERIZAR CHECKLISTS =====
    function renderizarChecklists() {
      filtrarChecklists();
    }

    function filtrarChecklists() {
      const tbody = document.getElementById('tabla-checklists');
      const filtroEquipo = document.getElementById('filtro-equipo').value.toLowerCase();
      const filtroArea = document.getElementById('filtro-area').value;
      
      const checklistsActivos = checklists.filter(chk => chk.activo);
      
      // Filtrar por equipo y área
      const checklistsFiltrados = checklistsActivos.filter(chk => {
        // Filtro por equipo
        if (filtroEquipo && !chk.equipo.toLowerCase().includes(filtroEquipo) && !chk.idEquipo.toLowerCase().includes(filtroEquipo)) {
          return false;
        }
        
        // Filtro por área
        if (filtroArea) {
          const plan = plans.find(p => p.id === chk.idEquipo);
          if (plan && plan.centro) {
            const centroMapeado = mapearCentro(plan.centro);
            return centroMapeado === filtroArea;
          }
          return false;
        }
        
        return true;
      });

      if (checklistsFiltrados.length === 0) {
        tbody.innerHTML = `
          <tr>
            <td colspan="4">
              <div class="empty-state">
                <p>No hay checklists que coincidan con los filtros</p>
              </div>
            </td>
          </tr>
        `;
        return;
      }

      tbody.innerHTML = checklistsFiltrados.map(chk => {
        const itemsPreview = chk.items.split('\n').slice(0, 3).join(', ') + (chk.items.split('\n').length > 3 ? '...' : '');
        
        return `
          <tr>
            <td><strong>${chk.idEquipo || '-'}</strong></td>
            <td><strong>${chk.equipo || '-'}</strong></td>
            <td style="max-width: 400px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;" title="${chk.items}">${itemsPreview}</td>
            <td>
              <span class="badge estado-realizado">Activo</span>
            </td>
          </tr>
        `;
      }).join('');
    }

    function mapearCentro(centro) {
      const mapeo = {
        'Zinc': 'Zinc',
        'Cromo': 'Cromo',
        'Doblado': 'Doblado',
        'General': 'Gral',
        'Gral': 'Gral'
      };
      return mapeo[centro] || 'Gral';
    }

    function mostrarError(mensaje) {
      document.getElementById('tabla-checklists').innerHTML = `
        <tr>
          <td colspan="4">
            <div class="empty-state">
              <p>${mensaje}</p>
            </div>
          </td>
        </tr>
      `;
    }

    // ===== RECARGA AUTOMÁTICA =====
    function configurarRecargaAutomatica() {
      const minutos = CONFIG.RECARGA_AUTOMATICA_MINUTOS;
      const milisegundos = minutos * 60 * 1000;
      
      setInterval(() => {
        console.log(`Recargando datos automáticamente (${minutos} minutos)`);
        cargarDatos();
      }, milisegundos);
      
      console.log(`Recarga automática configurada cada ${minutos} minutos`);
    }

    // ===== SUSCRIPCIÓN A CALENDARIO =====
    async function suscribirGoogleCalendar() {
      try {
        mostrarLoading('Generando calendario...');
        const result = await fetchGoogleSheets('getICS');
        
        if (result.success && result.ics) {
          descargarICS(result.ics, 'aminsa-mantenimientos.ics');
          mostrarInstrucciones('google');
        } else {
          alert('Error al generar el calendario: ' + (result.error || 'desconocido'));
        }
      } catch (error) {
        console.error('Error:', error);
        alert('Error al generar el calendario: ' + error.message);
      } finally {
        ocultarLoading();
      }
    }

    async function suscribirOutlook() {
      try {
        mostrarLoading('Generando calendario...');
        const result = await fetchGoogleSheets('getICS');
        
        if (result.success && result.ics) {
          descargarICS(result.ics, 'aminsa-mantenimientos.ics');
          mostrarInstrucciones('outlook');
        } else {
          alert('Error al generar el calendario: ' + (result.error || 'desconocido'));
        }
      } catch (error) {
        console.error('Error:', error);
        alert('Error al generar el calendario: ' + error.message);
      } finally {
        ocultarLoading();
      }
    }

    function descargarICS(contenido, nombre) {
      const blob = new Blob([contenido], { type: 'text/calendar;charset=utf-8' });
      const url = window.URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = nombre;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      window.URL.revokeObjectURL(url);
    }

    function mostrarInstrucciones(tipo) {
      if (tipo === 'google') {
        alert('Archivo descargado. En Google Calendar:\n1. Configuración > Agregar calendario > Importar\n2. Selecciona el archivo descargado\n3. El calendario se sincronizará automáticamente');
      } else if (tipo === 'outlook') {
        alert('Archivo descargado. En Outlook:\n1. Calendario > Agregar calendario > Importar\n2. Selecciona el archivo descargado\n3. El calendario se sincronizará automáticamente');
      }
    }

    function mostrarLoading(mensaje) {
      const loading = document.createElement('div');
      loading.id = 'loading-overlay';
      loading.style.cssText = 'position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center; z-index: 9999; color: white; font-size: 1.2rem;';
      loading.textContent = mensaje;
      document.body.appendChild(loading);
    }

    function ocultarLoading() {
      const loading = document.getElementById('loading-overlay');
      if (loading) {
        loading.remove();
      }
    }
  </script>
</body>
</html>
